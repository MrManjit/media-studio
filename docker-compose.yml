services:

  db:
    image: postgres:17
    container_name: media_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    container_name: media_redis
    restart: unless-stopped
    ports:
      - "6379:6379"


  backend:
    build:
      context: ./backend
    container_name: media_backend
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend/src:/app
      - ./media:/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis


  frontend:
    build:
      context: ./frontend
    container_name: media_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend


volumes:
  postgres_data: